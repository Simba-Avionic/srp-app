services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  desktop:
    build:
      context: .
      dockerfile: desktop/Dockerfile.web
    depends_on:
      - proxy
    ports:
      - "8080:80"
    restart: unless-stopped
